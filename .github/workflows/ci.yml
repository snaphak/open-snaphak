# CI -- the pull-request gate (the supply-chain defense).
#
# Runs on every PR in a SECRETLESS sandbox: the `pull_request` trigger gives fork PRs a read-only token and
# zero repo secrets. NEVER switch this to `pull_request_target` -- that runs fork code with secrets + base
# write context (the classic PR -> secret-exfil / RCE footgun). The only workflow that holds publish/signing
# secrets is release.yml, and it runs only on a reviewed tag.
#
# Every third-party action is pinned to a full commit SHA (immutable) with a human-readable version comment;
# Dependabot (.github/dependabot.yml) proposes SHA bumps as reviewable PRs. Do not replace a SHA with a tag.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  guard:
    name: Security guard (secretless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Compute diff base
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE='${{ github.event.pull_request.base.sha }}'
          else
            BASE='${{ github.event.before }}'
          fi
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE^{commit}" 2>/dev/null; then
            BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          fi
          echo "sha=$BASE" >> "$GITHUB_OUTPUT"
      - name: No new binaries
        run: |
          BASE='${{ steps.base.outputs.sha }}'
          ADDED=$(git diff --diff-filter=A --name-only "$BASE...HEAD")
          BAD=$(printf '%s\n' "$ADDED" | grep -Ei '\.(dll|exe|obj|lib|exp|pdb|ilk|bin|so|dylib|a|zip|7z)$' || true)
          if [ -n "$BAD" ]; then
            echo "::error::This PR adds binary file(s) -- forbidden; the source is the only deliverable, CI builds binaries:"
            printf '%s\n' "$BAD"
            exit 1
          fi
          echo "OK: no binary files added."
      - name: Capability-surface scan
        run: |
          BASE='${{ steps.base.outputs.sha }}'
          ADDED=$(git diff "$BASE...HEAD" -- 'src/**' 'installer/**' | grep -E '^\+' | grep -v '^\+\+\+' || true)
          # BLOCK (hard-fail): code-injection + boot-persistence APIs an in-process game mod + its installer have
          # NO legitimate reason to call. The tool hooks its OWN process (VirtualProtect + memcpy) -- it never
          # writes another process's memory, spawns a remote thread, or installs a Run-key / scheduled task.
          BLOCK='WriteProcessMemory|CreateRemoteThread|NtCreateThreadEx|RtlCreateUserThread|VirtualAllocEx|QueueUserAPC|CurrentVersion..Run|schtasks'
          BAD=$(printf '%s\n' "$ADDED" | grep -nEi "$BLOCK" || true)
          if [ -n "$BAD" ]; then
            echo "::error::Capability-surface scan BLOCKED: new lines call code-injection / persistence APIs the"
            echo "::error::tool has no legitimate reason to use. If truly intended, a maintainer must justify it:"
            printf '%s\n' "$BAD"
            exit 1
          fi
          # WARN (manual review): lower-confidence surfaces -- network, process spawn, generic registry writes.
          # The installer legitimately shells out to `reg query` / `tasklist`, so these only ask a reviewer to look.
          WARN='WinHttp|URLDownloadToFile|InternetOpen|WSAStartup|\bsocket\s*\(|CreateProcess|ShellExecute|WinExec|\bsystem\s*\(|RegSetValue'
          HITS=$(printf '%s\n' "$ADDED" | grep -nEi "$WARN" || true)
          if [ -n "$HITS" ]; then
            echo "::warning::Capability-surface scan flagged new lines for MANUAL review (network / process-spawn /"
            echo "::warning::registry): confirm each is a legitimate use before merging:"
            printf '%s\n' "$HITS"
          else
            echo "OK: no blocked APIs, and no flagged capability-surface APIs introduced."
          fi
      - name: Secret scan (gitleaks)
        # The gitleaks-action@v2 requires a PAID license for organizations; the gitleaks BINARY is free.
        # Pinned version (reproducible + supply-chain friendly). --exit-code 1 fails the job on any leak.
        run: |
          VER=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --no-git --source . --redact --no-banner --exit-code 1

  build:
    name: Build + test (Windows)
    # Builds the backend (XINPUT1_3.dll) + the WebView2 (HTML) frontend (snaphakui.dll) -- the sole frontend.
    # No Qt install, no Qt bundle: the frontend renders in the system-installed WebView2 runtime. This job also
    # covers the C unit tests + the installer's gofmt/vet/test/build (they're frontend-independent).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.21'
      - name: Build backend + frontend
        shell: pwsh
        run: |
          # The .ps1 throws on failure (its ErrorActionPreference=Stop) -> a non-zero step exit. Do NOT gate on
          # $LASTEXITCODE: a pure-cmdlet .ps1 (e.g. package.ps1) runs no native command, so it stays $null and
          # "$null -ne 0" is TRUE -> a false failure.
          $ErrorActionPreference = 'Stop'
          .\build.ps1
      - name: Package the overlay
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          .\package.ps1
      - name: Clean-room bundle guard (layout + genuinely Qt-free)
        shell: pwsh
        run: |
          # The bundle is deliberately lean -- just the two clone DLLs, no Qt runtime to bundle (the frontend
          # renders in the system WebView2 runtime). Assert the required files exist AND that nothing Qt-shaped
          # snuck in -- a regression here would silently reintroduce a Qt dependency.
          $ErrorActionPreference = 'Stop'
          $dist = "dist"
          $must = @("XINPUT1_3.dll", "snaphak\snaphakui.dll", "MANIFEST.sha256")
          foreach ($f in $must) {
            if (-not (Test-Path (Join-Path $dist $f))) { throw "bundle guard: missing $f in dist\" }
          }
          if (Test-Path (Join-Path $dist "platforms")) {
            throw "bundle guard: dist\platforms\ must not exist -- the bundle ships no Qt platform plugin"
          }
          $present = @(Get-ChildItem -Recurse -File $dist | ForEach-Object { $_.Name.ToLower() })
          $qtish = $present | Where-Object { $_ -match '^qt5|^qwindows\.dll$' }
          if ($qtish) {
            throw "bundle guard: Qt-shaped file(s) found in dist\ ($($qtish -join ', ')) -- the bundle must stay Qt-free"
          }
          Write-Host "bundle guard OK: lean overlay, no Qt runtime present"
      - name: XInput ordinal parity (must match System32)
        shell: pwsh
        run: |
          $dumpbin = (Get-ChildItem "C:\Program Files*\Microsoft Visual Studio\*\*\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" | Select-Object -First 1).FullName
          $ex = & $dumpbin /exports build\XINPUT1_3.dll
          if (-not ($ex -match '(?m)^\s*2\s.*XInputGetState') -or -not ($ex -match '(?m)^\s*3\s.*XInputSetState')) {
            $ex | Write-Host
            throw "XInput ordinals must be 2=GetState, 3=SetState"
          }
          Write-Host "ordinals OK (2=GetState, 3=SetState)"
      - name: C unit tests (self-contained)
        shell: pwsh
        run: |
          .\tests\run-tests.ps1
          if ($LASTEXITCODE -ne 0) { throw "C unit tests failed" }
      - name: Installer -- gofmt + vet + test + build
        shell: pwsh
        working-directory: installer
        run: |
          $u = gofmt -l .
          if ($u) { throw "gofmt: these files need formatting: $u" }
          go vet ./...;   if ($LASTEXITCODE -ne 0) { throw "go vet failed" }
          go test ./...;  if ($LASTEXITCODE -ne 0) { throw "go test failed" }
          go build -o snaphak.exe .; if ($LASTEXITCODE -ne 0) { throw "go build failed" }
