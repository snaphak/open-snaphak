# release.yml -- the maintainer-only release pipeline.
#
# Runs ONLY on a pushed tag v* -> it builds only reviewed code, and it is the sole place the publish token
# lives (unreachable from a PR). Cut a release: `git tag v1.2.3 && git push origin v1.2.3`.
# It builds the DLLs + the installer, assembles the overlay, and publishes a GitHub Release with the bundle
# zip + snaphak.exe + install.ps1. (The release publishes to THIS repo via the github context -- no slug.)
#
# Every third-party action is pinned to a full commit SHA (immutable) with a version comment; Dependabot
# (.github/dependabot.yml) proposes bumps as reviewable PRs. This workflow also attests the provenance of the
# published release artifacts (actions/attest-build-provenance) so a downloader can verify they came from here.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write       # create the GitHub Release
  id-token: write       # OIDC token used to sign the build-provenance attestation
  attestations: write   # record the provenance attestation for the published artifacts

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history + tags -- the changelog step diffs this tag against the previous one
      - name: Install Qt 5.9.9
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: '5.9.9'
          arch: win64_msvc2017_64
      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.21'
      - name: Build + package
        shell: pwsh
        run: |
          # The .ps1 throw on failure (ErrorActionPreference=Stop); do NOT gate on $LASTEXITCODE -- a pure-cmdlet
          # package.ps1 runs no native command, so it stays $null and "$null -ne 0" is TRUE (a false failure).
          $ErrorActionPreference = 'Stop'
          .\build.ps1 -QtDir "$env:QT_ROOT_DIR"
          .\package.ps1 -QtDir "$env:QT_ROOT_DIR"
      - name: Build installer (version-stamped)
        shell: pwsh
        working-directory: installer
        run: |
          go build -ldflags "-X main.version=${{ github.ref_name }}" -o ..\dist\snaphak.exe .
          if ($LASTEXITCODE -ne 0) { throw "installer build failed" }
      - name: Zip the overlay
        shell: pwsh
        run: |
          # snaphak-bundle.zip = the 6-file overlay + MANIFEST.sha256 (the installer's --release download target).
          # snaphak.exe is published as a SEPARATE asset, not bundled into the overlay zip.
          Compress-Archive -Force -DestinationPath snaphak-bundle.zip `
            -Path dist\XINPUT1_3.dll, dist\snaphak, dist\platforms, dist\MANIFEST.sha256
      - name: Build the changelog from the commit log
        shell: bash
        run: |
          # The release BODY is the commit subjects since the previous version tag -- plain text, no links,
          # so `snaphak changelog` can print it straight to the console (readable even while the repo is
          # private). GitHub's own generate_release_notes is PR-based; releases here are cut by tagging main
          # directly (no PRs), so it produces only a "Full Changelog" link -- not what we want.
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          prev="$(git describe --tags --abbrev=0 --match 'v*' "${tag}^" 2>/dev/null || true)"
          if [ -n "$prev" ]; then
            echo "Changes since ${prev}:" > notes.md
            range="${prev}..${tag}"
          else
            echo "Initial release." > notes.md
            range="${tag}"
          fi
          echo "" >> notes.md
          # Commit SUBJECTS only (%s omits body/trailers). Two defensive filters:
          #  1) drop internal commit types (ci/chore/scrub/docs/tests/release/refactor/build/style) -- they are
          #     not user-facing AND are where internal tooling terminology would otherwise surface publicly;
          #  2) strip any authoring attribution.
          # `|| true` keeps an all-filtered range from failing the step under `set -o pipefail`.
          git log --no-merges --pretty=format:'- %s' "$range" \
            | grep -viE '^- (ci|chore|scrub|docs|tests?|release|refactor|build|style|meta): ' \
            | grep -viE 'co-authored-by|generated with claude|claude\.com/claude-code|noreply@anthropic|🤖' \
            >> notes.md || true
          echo "" >> notes.md
      - name: Attest build provenance (the published artifacts)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          # Attest exactly what users download: the overlay bundle + the installer exe. A downloader can then
          # verify origin with `gh attestation verify <file> --repo snaphak/open-snaphak`.
          subject-path: |
            snaphak-bundle.zip
            dist/snaphak.exe
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          # A tag with a '-' (e.g. v0.3.0-beta.1) is a BETA pre-release: GitHub excludes it from "latest", so
          # `snaphak update` (end users) never gets it; beta testers opt in via `snaphak install --release <tag>`.
          # A plain tag (v0.3.0) is the stable release end users update to.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            snaphak-bundle.zip
            dist/snaphak.exe
            installer/install.ps1
          body_path: notes.md

# --- Auto-re-patcher (PLANNED, not built -- the portability endgame) ---
# A future job that, on a NEW DOOM build, re-resolves the engine signatures (src/backend/signatures.c) against
# the new binary, rebuilds, runs the in-DLL self-proof, and -- if green -- publishes a compatible release
# automatically. Because the clone resolves engine functions by SIGNATURE (not hardcoded RVAs), many DOOM
# patches need no rebuild at all; this job handles the ones that do. v1 ships this as a documented stub only.
